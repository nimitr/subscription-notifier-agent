name: Weekly subscription renewals

on:
  schedule:
    # TEMP TEST: Wed 2026-05-27 @ 4:59 PM PDT = 23:59 UTC Wed, day-of-week 3.
    # REVERT to "0 17 * * 1" (Mondays 10 AM PDT) after the test fires.
    - cron: "59 23 * * 3"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Edit these to match your Notion database column names / cost type / currency.
      DATE_PROPERTY: "Next Billing Date"
      NAME_PROPERTY: "Name"
      COST_PROPERTY: "Cost Per Unit"
      COST_TYPE: "number"
      CURRENCY: "$"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python subscription_notifier.py
