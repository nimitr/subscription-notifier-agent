name: Weekly subscription renewals

on:
  schedule:
    # Cron fields: minute hour day-of-month month day-of-week
    #              0      17   *            *     1
    # -> "at 17:00 UTC every Monday" (day-of-week 1 = Monday; * = every).
    # GitHub Actions cron is always UTC and does not observe DST.
    # 17:00 UTC = 10:00 PDT (Mar–Nov). During PST (Nov–Mar) this fires at
    # 09:00 PT; if you want a true year-round 10:00 PT, change to "0 18 * * 1"
    # during PST months.
    - cron: "0 17 * * 1"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Opt into Node.js 24 for JavaScript actions. Silences the deprecation
      # warning on actions/checkout + actions/setup-python and gets us off
      # Node 20 ahead of the June 2026 forced cutover. Remove once the
      # pinned actions ship a major version that defaults to Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      # Edit these to match your Notion database column names / cost type / currency.
      DATE_PROPERTY: "Next Billing Date"
      NAME_PROPERTY: "Name"
      COST_PROPERTY: "Cost Per Unit"
      COST_TYPE: "number"
      CURRENCY: "$"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python subscription_notifier.py
